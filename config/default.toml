# Sirius - default configuration
#
# This file is always loaded. Environment-specific files (development.toml, production.toml) are
# merged on top. Environment variables with the prefix SIRIUS_ override everything.
#
# Do not put secrets here. Use environment variables for database passwords, Redis auth tokens
# and similar.

[server]
environment = "development"
port = 2096
bind_address = "127.0.0.1"
max_connections = 2000
shutdown_timeout_secs = 30

[database]
url = "postgres://cukubik:helloworld@localhost:5432/sirius"
max_connections = 10
min_connections = 10
acquire_timeout_secs = 5
max_lifetime_secs = 1800
run_migrations = false

[network]
read_timeout_secs = 120
write_timeout_secs = 30
rate_limit_per_ip = 10
read_buffer_size = 8192
websocket_enabled = true
websocket_path = "/"
websocket_ping_interval_secs = 30
